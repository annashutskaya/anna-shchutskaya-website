backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "website"
    label: "Website Content"
    files:
      - name: "homepage"
        label: "Homepage"
        file: "content/site.yml"
        fields:
          - label: "Name"
            name: "name"
            widget: "string"

          - label: "Headline"
            name: "headline"
            widget: "string"

          - label: "Location"
            name: "location"
            widget: "string"
            required: false

          - label: "Intro"
            name: "intro"
            widget: "text"

          - label: "About"
            name: "about"
            widget: "markdown"

          - label: "Experience"
            name: "experience"
            widget: "list"
            fields:
              - label: "Role"
                name: "role"
                widget: "string"
              - label: "Company"
                name: "company"
                widget: "string"
              - label: "Period / Location"
                name: "period"
                widget: "string"
                required: false
              - label: "Description"
                name: "description"
                widget: "text"

          - label: "Skills"
            name: "skills"
            widget: "list"
            fields:
              - label: "Category"
                name: "category"
                widget: "string"
              - label: "Items"
                name: "items"
                widget: "list"
                field:
                  label: "Skill"
                  name: "skill"
                  widget: "string"

          - label: "Portfolio"
            name: "portfolio"
            widget: "list"
            fields:
              - label: "Title"
                name: "title"
                widget: "string"
              - label: "Type"
                name: "type"
                widget: "string"
                required: false
              - label: "Description"
                name: "description"
                widget: "text"
              - label: "Image"
                name: "image"
                widget: "image"
                required: false

          - label: "Contact"
            name: "contact"
            widget: "object"
            fields:
              - label: "Email"
                name: "email"
                widget: "string"
                required: false
              - label: "LinkedIn"
                name: "linkedin"
                widget: "string"
                required: false
