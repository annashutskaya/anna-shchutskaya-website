<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Anna Shchutskaya | Professional Portfolio</title>
  <meta name="description" content="Professional portfolio of Anna Shchutskaya: operations, client support, marketing operations, and digital content administration." />

  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>

  <style>
    :root {
      --bg: #f7f4ef;
      --surface: #ffffff;
      --text: #222222;
      --muted: #666666;
      --accent: #6f4e37;
      --accent-soft: #eadfd5;
      --border: #e4ded7;
      --shadow: 0 12px 32px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
    }

    header {
      padding: 24px 0;
      border-bottom: 1px solid var(--border);
      background: rgba(247, 244, 239, 0.92);
      position: sticky;
      top: 0;
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .nav-links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 0.95rem;
    }

    .hero {
      padding: 88px 0 64px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.35fr 0.65fr;
      gap: 40px;
      align-items: center;
    }

    .eyebrow {
      display: inline-block;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.9rem;
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.7rem);
      line-height: 1.04;
      margin: 0 0 18px;
      letter-spacing: -0.05em;
    }

    .headline {
      font-size: clamp(1.15rem, 2vw, 1.45rem);
      color: var(--muted);
      max-width: 720px;
      margin-bottom: 28px;
    }

    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid var(--accent);
      font-weight: 700;
    }

    .button.primary {
      background: var(--accent);
      color: white;
    }

    .hero-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .hero-card strong {
      display: block;
      font-size: 1.05rem;
      margin-bottom: 8px;
    }

    section {
      padding: 48px 0;
    }

    .section-title {
      font-size: clamp(1.7rem, 3vw, 2.4rem);
      margin: 0 0 22px;
      letter-spacing: -0.03em;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    .grid.two {
      grid-template-columns: repeat(2, 1fr);
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    .meta {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 12px;
    }

    .skills-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0;
      list-style: none;
      margin: 14px 0 0;
    }

    .skills-list li {
      background: var(--accent-soft);
      color: var(--accent);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.9rem;
    }

    .portfolio-image {
      width: 100%;
      max-height: 240px;
      object-fit: cover;
      border-radius: 18px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }

    footer {
      padding: 36px 0;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.95rem;
    }

    .loading {
      padding: 80px 0;
      color: var(--muted);
    }

    @media (max-width: 850px) {
      .hero-grid,
      .grid,
      .grid.two {
        grid-template-columns: 1fr;
      }

      header {
        position: static;
      }

      nav {
        align-items: flex-start;
        flex-direction: column;
      }

      .hero {
        padding-top: 56px;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="container">
      <nav>
        <div class="brand" id="nav-name">Anna Shchutskaya</div>
        <div class="nav-links">
          <a href="#about">About</a>
          <a href="#experience">Experience</a>
          <a href="#skills">Skills</a>
          <a href="#portfolio">Digital Content</a>
          <a href="#contact">Contact</a>
          <a href="/admin/">Admin</a>
        </div>
      </nav>
    </div>
  </header>

  <main id="app">
    <div class="container loading">Loading website content...</div>
  </main>

  <footer>
    <div class="container">
      <span id="footer-text">© Anna Shchutskaya</span>
    </div>
  </footer>

  <script>
    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderList(items) {
      return (items || []).map(item => `<li>${escapeHtml(item)}</li>`).join("");
    }

    function renderSite(data) {
      document.title = `${data.name || "Anna Shchutskaya"} | Professional Portfolio`;
      document.getElementById("nav-name").textContent = data.name || "Anna Shchutskaya";
      document.getElementById("footer-text").textContent = `© ${data.name || "Anna Shchutskaya"}`;

      const contact = data.contact || {};
      const emailLink = contact.email
        ? `<a class="button primary" href="mailto:${escapeHtml(contact.email)}">Contact by email</a>`
        : `<a class="button primary" href="#contact">Contact</a>`;

      const linkedinLink = contact.linkedin
        ? `<a class="button" href="${escapeHtml(contact.linkedin)}" target="_blank" rel="noopener">LinkedIn</a>`
        : "";

      const experienceCards = (data.experience || []).map(item => `
        <article class="card">
          <h3>${escapeHtml(item.role)}</h3>
          <div class="meta">${escapeHtml(item.company)}${item.period ? " · " + escapeHtml(item.period) : ""}</div>
          <p>${escapeHtml(item.description)}</p>
        </article>
      `).join("");

      const skillCards = (data.skills || []).map(group => `
        <article class="card">
          <h3>${escapeHtml(group.category)}</h3>
          <ul class="skills-list">${renderList(group.items)}</ul>
        </article>
      `).join("");

      const portfolioCards = (data.portfolio || []).map(item => `
        <article class="card">
          ${item.image ? `<img class="portfolio-image" src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title)}">` : ""}
          <h3>${escapeHtml(item.title)}</h3>
          ${item.type ? `<div class="meta">${escapeHtml(item.type)}</div>` : ""}
          <p>${escapeHtml(item.description)}</p>
        </article>
      `).join("");

      document.getElementById("app").innerHTML = `
        <section class="hero">
          <div class="container hero-grid">
            <div>
              <div class="eyebrow">${escapeHtml(data.location || "Cyprus")}</div>
              <h1>${escapeHtml(data.name || "Anna Shchutskaya")}</h1>
              <p class="headline">${escapeHtml(data.headline || "")}</p>
              <p>${escapeHtml(data.intro || "")}</p>
              <div class="actions">
                ${emailLink}
                <a class="button" href="#experience">View experience</a>
                ${linkedinLink}
              </div>
            </div>

            <aside class="hero-card">
              <strong>Profile focus</strong>
              <p>Operations, client support, structured documentation, CRM/CMS-style content administration, and digital content support.</p>
            </aside>
          </div>
        </section>

        <section id="about">
          <div class="container">
            <h2 class="section-title">About</h2>
            <div class="card">
              <p>${escapeHtml(data.about || "")}</p>
            </div>
          </div>
        </section>

        <section id="experience">
          <div class="container">
            <h2 class="section-title">Experience</h2>
            <div class="grid">${experienceCards}</div>
          </div>
        </section>

        <section id="skills">
          <div class="container">
            <h2 class="section-title">Skills</h2>
            <div class="grid two">${skillCards}</div>
          </div>
        </section>

        <section id="portfolio">
          <div class="container">
            <h2 class="section-title">Digital Content Portfolio</h2>
            <div class="grid two">${portfolioCards}</div>
          </div>
        </section>

        <section id="contact">
          <div class="container">
            <h2 class="section-title">Contact</h2>
            <div class="card">
              <p>For professional opportunities, please use the contact links below.</p>
              <div class="actions">
                ${contact.email ? `<a class="button primary" href="mailto:${escapeHtml(contact.email)}">Email</a>` : ""}
                ${contact.linkedin ? `<a class="button" href="${escapeHtml(contact.linkedin)}" target="_blank" rel="noopener">LinkedIn</a>` : ""}
              </div>
            </div>
          </div>
        </section>
      `;
    }

    fetch("/content/site.yml")
      .then(response => {
        if (!response.ok) {
          throw new Error("Could not load content/site.yml");
        }
        return response.text();
      })
      .then(text => {
        const data = jsyaml.load(text);
        renderSite(data);
      })
      .catch(error => {
        document.getElementById("app").innerHTML = `
          <div class="container loading">
            <strong>Website content could not be loaded.</strong>
            <p>${escapeHtml(error.message)}</p>
          </div>
        `;
      });
  </script>
</body>
</html>
